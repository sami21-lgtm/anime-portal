<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Voice Animation Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slider-container" id="mainContainer">
        <h2>Tap a Card to Hear the Intro</h2>
        
        <div class="slider">
            <div class="slider-track" id="sliderTrack">
                
                <div class="slide-card" data-voice="audio/intro1.mp3">
                    <img src="images/pic1.jpg" alt="Photo 1">
                </div>
                
                <div class="slide-card" data-voice="audio/intro2.mp3">
                    <img src="images/pic2.jpg" alt="Photo 2">
                </div>
                
                <div class="slide-card" data-voice="audio/intro3.mp3">
                    <img src="images/pic3.jpg" alt="Photo 3">
                </div>

                <div class="slide-card" data-voice="audio/intro4.mp3">
                    <img src="images/pic4.jpg" alt="Photo 4">
                </div>

            </div>
        </div>
        <p class="hint-text">Tap any card to activate cinematic intro zoom</p>
    </div>

    <audio id="voicePlayer" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
