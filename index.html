<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Circular Tap Rotator Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slider-container" id="mainContainer">
        <h2>Tap a Character to Spin & Play Intro</h2>
        
        <div class="slider-scene">
            <div class="slider-carousel" id="sliderTrack">
                
                <div class="slide-card" data-index="0" data-voice="audio/intro1.mp3">
                    <img src="images/pic1.jpg" alt="Photo 1">
                </div>
                
                <div class="slide-card" data-index="1" data-voice="audio/intro2.mp3">
                    <img src="images/pic2.jpg" alt="Photo 2">
                </div>
                
                <div class="slide-card" data-index="2" data-voice="audio/intro3.mp3">
                    <img src="images/pic3.jpg" alt="Photo 3">
                </div>

                <div class="slide-card" data-index="3" data-voice="audio/intro4.mp3">
                    <img src="images/pic4.jpg" alt="Photo 4">
                </div>

                <div class="slide-card" data-index="4" data-voice="audio/intro5.mp3">
                    <mp3 src="images/pic5.jpg" alt="Photo 5">
                </div>

            </div>
        </div>
        <p class="hint-text">Automatic continuous circle animation. Tap any card to rotate to center!</p>
    </div>

    <audio id="voicePlayer" preload="auto"></audio>

    <script src="script.js"></script>
</body>
</html>
